name: CI

# Runs the same quality gates as local dev on every PR and on pushes to main. The
# non-trivial gates live in ./scripts/ (called here and by the justfile / git
# hooks); the trivial cargo gates are inline one-liners. No `just` is installed.
# Jobs:
#   rust       - cargo fmt-check / build / clippy / test
#   frontend   - TypeScript type-check, build-artifact drift guard, and JS/TS tests
#   playwright - browser-driven end-to-end tests against isolated app instances
#   shellcheck - lint all tracked shell scripts
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel an in-progress run when a new commit is pushed to the same ref.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Build-time system deps for the default (paddle-ocr) feature set:
      #   pkg-config + libav*-dev/libsw*-dev  - ffmpeg-sys-next links system FFmpeg
      #   clang + libclang-dev                - bindgen in the vendored ocr-rs crate
      #   libfontconfig-dev                   - plotters' yeslogic-fontconfig-sys (pulls
      #                                         in freetype/expat -dev transitively)
      # curl/tar/unzip/git (used by the OCR build scripts to fetch MNN + models) are
      # already present on ubuntu-latest. See live-set-song-splitter/build.rs.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libclang-dev ffmpeg \
            libavcodec-dev libavformat-dev libavfilter-dev libavdevice-dev \
            libavutil-dev libswscale-dev libswresample-dev \
            libfontconfig-dev

      # rustup (preinstalled on the runner) auto-installs the channel + rustfmt/clippy
      # components pinned in rust-toolchain.toml on the first cargo invocation.
      - uses: Swatinem/rust-cache@v2

      # Cache the gitignored OCR assets the build scripts fetch over the network:
      #   live-set-song-splitter/models                  - 3 PaddleOCR model files (~21MB),
      #                                                    pinned in live-set-song-splitter/build.rs
      #   live-set-song-splitter/vendor/ocr-rs/3rd_party - prebuilt MNN lib (~15MB), via
      #                                                    that crate's build.rs
      # Both scripts skip the download when the files are already present, so a cache hit
      # avoids the fetch entirely. Keyed on the build.rs files so a version/commit bump
      # invalidates the cache. No restore-keys: a stale fallback would never be refreshed
      # (the scripts only download when the files are missing), including the moving MNN
      # "dev" tag.
      - name: Cache downloaded OCR models and prebuilt MNN
        uses: actions/cache@v6
        with:
          path: |
            live-set-song-splitter/models
            live-set-song-splitter/vendor/ocr-rs/3rd_party
          key: ocr-assets-${{ runner.os }}-${{ hashFiles('live-set-song-splitter/build.rs', 'live-set-song-splitter/vendor/ocr-rs/build.rs') }}

      - name: Format check
        run: cargo fmt --all -- --check

      # --locked: fail if the build would change Cargo.lock (dependency drift guard).
      - name: Build
        run: cargo build --locked --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - uses: taiki-e/install-action@682e7d9e49c5e653d371fc6adbda67653461378a # v2.82.4
        with:
          tool: nextest
      - name: Test
        run: cargo nextest run --tests

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Hurl (https://hurl.dev) black-box HTTP integration tests against a
      # real concert-web process — see hurl/README.md. Installed from the
      # official .deb release artifact, the method the Hurl docs recommend
      # for Debian/Ubuntu CI. Pin HURL_VERSION and bump deliberately.
      - name: Install Hurl
        run: |
          HURL_VERSION=8.0.1
          curl --location --remote-name \
            "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl_${HURL_VERSION}_amd64.deb"
          sudo apt-get update
          sudo apt-get install -y "./hurl_${HURL_VERSION}_amd64.deb"
          rm "hurl_${HURL_VERSION}_amd64.deb"

      # This builds concert-web --features test-control itself and runs hurl/*.hurl against it.
      # See hurl/README.md for what this does and does not cover.
      - name: Hurl web integration tests
        run: node scripts/hurl-test.js

      # Release-safety guard: the Test Control API (behind the `test-control`
      # feature) must never reach a release binary — see the compile_error!
      # in concert-tracker/src/test_control.rs. This step fails the build if
      # that guard is ever removed or bypassed; The above step only
      # builds in debug mode and would not catch that regression on its own.
      - name: Verify test-control cannot build in release mode
        run: |
          if output=$(cargo build --release --bin concert-web --features test-control 2>&1); then
            echo "::error::cargo build --release --features test-control succeeded — the release guard in concert-tracker/src/test_control.rs is missing or broken."
            echo "$output"
            exit 1
          fi
          if ! grep -q "test-control must not be compiled into release builds" <<<"$output"; then
            echo "::error::Build failed as expected, but not with the release guard's compile_error! message — a different, unrelated failure may be masking a missing guard:"
            echo "$output"
            exit 1
          fi
          echo "Release guard confirmed: test-control feature correctly fails to build in release mode."

      # Backstop the --locked flags above and catch any other build-time mutation
      # (gitignored artifacts under target/, models/, 3rd_party/ are not reported).
      # Placed last so it also covers the hurl/release-guard steps above.
      - name: Verify working tree is clean
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Build left the working tree dirty (uncommitted/generated files):"
            git status --porcelain
            git diff
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            concert-tracker/frontend/package-lock.json

      # npm ci installs strictly from the lockfiles and fails on package.json drift,
      # so it doubles as the lockfile guard for the JS dependencies.
      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix concert-tracker/frontend

      - name: TypeScript type-check
        run: ./scripts/ts-check.sh

      - name: TypeScript lint
        run: ./scripts/ts-lint.sh

      # Fails if committed static/player.js drifts from a fresh esbuild of frontend/src.
      - name: Verify generated bundles
        run: ./scripts/ts-verify.sh

      - name: Test
        run: ./scripts/ts-test.sh

      # Catches drift in any generated artifact a build touches: the static/*.js bundles
      # (including the minified splitter.js/playlists.js that ts-verify does not diff-guard)
      # and the generated OpenAPI types.
      - name: Verify working tree is clean
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Build left the working tree dirty (uncommitted/generated files):"
            git status --porcelain
            git diff
            exit 1
          fi

  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      # The fixture generator calls the system ffmpeg executable directly.
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential pkg-config clang libclang-dev ffmpeg \
              libavcodec-dev libavformat-dev libavfilter-dev libavdevice-dev \
              libavutil-dev libswscale-dev libswresample-dev \
              libfontconfig-dev

      # Install only the browser used by playwright.config.js. --with-deps
      # provisions the Linux libraries required by Chromium on a clean runner.
      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      # global-setup.js builds concert-web and the deterministic test fixture.
      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_attempt }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  shellcheck:
    runs-on: ubuntu-latest  # shellcheck is preinstalled on the runner image
    steps:
      - uses: actions/checkout@v7
      - name: ShellCheck
        run: ./scripts/shellcheck.sh
