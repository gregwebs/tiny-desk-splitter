{% extends "layout.html" %}
{% block content %}
<p><a href="/" class="back-link">&larr; Back to list</a></p>
<h2>Settings</h2>
<form method="post" action="/settings">
  <label for="archive_location"><strong>Archive Location</strong></label>
  <p style="font-size: 0.85em; color: #666; margin: 0.25rem 0 0.5rem;">
    Directory where concerts will be archived (e.g. /nas/media/music).
    Leave empty to disable archiving.
  </p>
  <input type="text" id="archive_location" name="archive_location"
         value="{{ archive_location }}"
         placeholder="/nas/media/music"
         style="width: 100%; padding: 0.5rem; font-family: monospace; font-size: 0.9em;
                border: 1px solid #ccc; border-radius: 4px;">
  <br><br>
  <button type="submit" class="btn-primary">Save</button>
  {% if saved %}<span style="color: #198754; margin-left: 0.75rem; font-size: 0.85em;">Settings saved.</span>{% endif %}
</form>
{% endblock %}
