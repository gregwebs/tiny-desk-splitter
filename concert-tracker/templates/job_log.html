{% extends "layout.html" %}
{% block content %}
<p><a href="/jobs" class="back-link">&larr; Back to jobs</a></p>
<h2>Job Log #{{ job.id }}</h2>
<p>
  <a href="/concerts/{{ job.concert_id }}">{{ job.title }}</a> &middot;
  <span class="badge badge-download-error">{{ job.name }}</span> &middot;
  Failed {{ job.failed_at }}
</p>
<p class="error-list">{{ job.failure_message }}</p>
<pre class="job-log">{{ content }}</pre>
{% endblock %}
