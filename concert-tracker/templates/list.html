{% extends "layout.html" %}
{% block content %}
<div class="filter-chips">
  {% for (href, label, active_class) in filters %}
  <a href="{{ href }}" class="{{ active_class }}">{{ label }}</a>
  {% endfor %}
</div>
<div class="card-grid" id="concert-list">
  {% for row in rows %}
  {{ row|safe }}
  {% endfor %}
</div>
{% endblock %}
