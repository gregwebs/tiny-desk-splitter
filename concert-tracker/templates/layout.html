<!DOCTYPE html>
{# Boosted navigation swaps only #content (never <html>), so data-theme survives navigations. Any future swap that targets <html> would lose it. #}
<html lang="en"{% if chrome.theme.is_explicit() %} data-theme="{{ chrome.theme.as_str() }}"{% endif %}>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Tiny Desk Concerts</title>
  <script src="/static/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body hx-boost="true">
  <header>
    <h1><a href="/" style="text-decoration: none;" hx-target="#content" hx-select="#content" hx-swap="outerHTML show:window:top">Tiny Desk Concerts</a></h1>
    <span style="font-size: 0.85em;"><a href="/playlists" style="text-decoration: none; font-weight: 500;" hx-target="#content" hx-select="#content" hx-swap="outerHTML show:window:top">Playlists</a></span>
    <span id="banner"></span>
    <span style="font-size: 0.85em; margin-left: auto;"><a href="/jobs" style="text-decoration: none; font-weight: 500;" hx-target="#content" hx-select="#content" hx-swap="outerHTML show:window:top">Jobs</a><span hx-get="/jobs/count" hx-trigger="load, every 5s" hx-swap="innerHTML"></span></span>
    <a href="/settings" style="font-size: 1.1em; text-decoration: none;" title="Settings" hx-target="#content" hx-select="#content" hx-swap="outerHTML show:window:top">&#9881;</a>
  </header>
  <main id="content" hx-history-elt>{% block content %}{% endblock %}</main>
  <div id="player-container">
    <!-- Foldkit player widget renders #player-bar + #player-sidebar into this
         root (src/player/widget/view.ts). Lives as a sibling of the video panel
         and add-section overlay so neither element is ever re-rendered away. -->
    <div id="player-root"></div>
    <!-- Overlay that covers the sidebar rect when body.showing-add is set.
         Sibling of #player-root so player re-renders don't wipe the add-panel
         Foldkit runtime. CSS positions it identically to the sidebar. -->
    <section id="sidebar-add-section" aria-label="Add to playlist">
      <!-- The add-to-playlist panel is a Foldkit widget (playlists.js,
           src/playlists/widget); it renders the header / filter / list /
           error into this mount point. See src/playlists/index.ts. -->
      <div id="add-pl-widget-root"></div>
    </section>
    <div id="player-video-panel">
      <video id="player-audio" playsinline webkit-playsinline tabindex="0" onclick="Player.togglePause()"></video>
      <button id="player-video-close" onclick="Player.watch()" title="Minimize video" aria-label="Minimize video">&#10005;</button>
    </div>
  </div>
  <script>
    // Fill a listing card's track list on first hover. Visibility is pure CSS
    // (#concert-list .card:hover); this only fetches the list HTML once and
    // leaves it in the DOM as a cache. Single-card htmx swaps (status polling,
    // want/ignore, deletes) arrive with the tracks already embedded, so the
    // hover never refetches stale content.
    document.addEventListener("mouseover", function (e) {
      if (!e.target.closest) return;
      var card = e.target.closest("#concert-list .card");
      if (!card) return;
      var box = card.querySelector(".card-tracks-box");
      if (!box || box.children.length > 0 || box.dataset.loading) return;
      var concertId = card.id.replace("concert-", "");
      box.dataset.loading = "1";
      fetch("/concerts/" + concertId + "/tracks")
        .then(function(r) { return r.text(); })
        .then(function(html) {
          box.innerHTML = html;
          // Wire up hx-* attributes on the just-injected tracks list (the
          // delete ✕ button uses hx-post). innerHTML bypasses htmx so we have
          // to process it manually; htmx auto-processes its own swap responses.
          if (window.htmx) htmx.process(box);
        })
        .finally(function() { delete box.dataset.loading; });
    });

    // ── Global htmx request feedback ──────────────────────────────────────
    // htmx fires htmx:sendError on a network failure (e.g. server stopped),
    // htmx:responseError on an HTTP error status, and htmx:timeout on timeout.
    // None of these swap content, so the triggering element still exists and we
    // anchor a small inline error next to it. The in-flight spinner/dim is
    // handled purely in CSS via the .htmx-request class.
    (function () {
      var AUTO_CLEAR_MS = 6000;
      // Per-element bookkeeping so concurrent failures on different controls
      // don't clobber each other, and so timers are scoped + cancellable.
      var errors = new WeakMap(); // elt -> { node, timer }

      function clearInlineError(elt) {
        if (!elt) return;
        var rec = errors.get(elt);
        if (!rec) return;
        clearTimeout(rec.timer);
        if (rec.node && rec.node.parentNode) rec.node.remove();
        errors.delete(elt);
      }

      function showInlineError(elt, msg) {
        if (!elt) return;
        // Don't surface errors for background polling (e.g. the status card's
        // hx-trigger="every 3s") — those aren't user-initiated requests.
        var trig = elt.getAttribute && elt.getAttribute("hx-trigger");
        if (trig && trig.indexOf("every") !== -1) return;
        clearInlineError(elt); // replace any prior error for this element
        var node = document.createElement("span");
        node.className = "req-error";
        node.setAttribute("role", "alert");
        node.textContent = msg;
        elt.insertAdjacentElement("afterend", node);
        var timer = setTimeout(function () {
          // The element/error may have been swapped away in the meantime.
          if (node.isConnected) node.remove();
          errors.delete(elt);
        }, AUTO_CLEAR_MS);
        errors.set(elt, { node: node, timer: timer });
      }

      function statusMessage(evt) {
        var xhr = evt.detail && evt.detail.xhr;
        var status = xhr && xhr.status;
        return status ? "Request failed (" + status + ")" : "Request failed";
      }

      document.body.addEventListener("htmx:sendError", function (evt) {
        showInlineError(evt.detail.elt, "Server unreachable");
      });
      document.body.addEventListener("htmx:responseError", function (evt) {
        showInlineError(evt.detail.elt, statusMessage(evt));
      });
      document.body.addEventListener("htmx:timeout", function (evt) {
        showInlineError(evt.detail.elt, "Request timed out");
      });
      // Retrying a control clears its stale error before the new request runs.
      document.body.addEventListener("htmx:beforeRequest", function (evt) {
        clearInlineError(evt.detail.elt);
      });
    })();
  </script>
  <script src="/static/player.js"></script>
  <script src="/static/playlists.js"></script>
  <script src="/static/splitter.js"></script>
</body>
</html>
